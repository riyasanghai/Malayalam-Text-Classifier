<!DOCTYPE html>
<html lang="ml">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Malayalam Text Classifier</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background-color: #0b0c10;
      color: #e8eaf0;
      line-height: 1.5;
    }

    .container {
      max-width: 900px;
      margin: 50px auto;
      padding: 20px;
      background-color: #111217;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }

    h1 {
      text-align: center;
      font-size: 1.8rem;
      margin-bottom: 20px;
      color: #7aa2ff;
    }

    .panel {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
      color: #9aa3b2;
    }

    textarea {
      width: 100%;
      height: 150px;
      padding: 10px;
      font-size: 1rem;
      border-radius: 8px;
      border: 1px solid #333;
      background-color: #16181f;
      color: #ffffff;
      resize: vertical;
    }

    textarea:focus {
      outline: none;
      border-color: #7aa2ff;
      box-shadow: 0 0 0 3px rgba(122,162,255,0.3);
    }

    .output {
      width: 100%;
      min-height: 120px;
      background-color: #0f1117;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 15px;
      color: #e8eaf0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      white-space: pre-wrap;
      line-height: 1.8;
    }

    .sentiment-label {
      font-size: 1.3rem;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .sentiment-positive {
      color: #4ade80;
    }

    .sentiment-negative {
      color: #f87171;
    }

    .sentiment-neutral {
      color: #94a3b8;
    }

    .confidence {
      color: #9aa3b2;
      font-size: 0.9rem;
      margin-top: 8px;
    }

    .scores {
      margin-top: 12px;
      font-size: 0.85rem;
      color: #9aa3b2;
    }

    .score-item {
      margin: 4px 0;
    }

    .buttons {
      display: flex;
      gap: 10px;
      margin-top: 15px;
    }

    button {
      flex: 1;
      padding: 10px;
      font-size: 1rem;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.2s;
    }

    .classify-btn {
      background-color: #7aa2ff;
      color: #fff;
    }

    .clear-btn {
      background-color: #333;
      color: #9aa3b2;
    }

    button:hover {
      opacity: 0.9;
      transform: scale(1.02);
    }

    .footer {
      text-align: center;
      font-size: 0.9rem;
      color: #9aa3b2;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Malayalam Text Classifier</h1>

    <div class="panel">
      <label for="inputText">Enter Malayalam Text:</label>
      <textarea id="inputText" placeholder="ഉദാഹരണം: ഇന്നത്തെ വാർത്തകളിൽ വിദ്യാഭ്യാസ മേഖലയിലെ മാറ്റങ്ങളെക്കുറിച്ച് ചർച്ച ചെയ്തു..."></textarea>
    </div>

    <div class="buttons">
      <button class="classify-btn" id="classifyBtn">Classify</button>
      <button class="clear-btn" id="clearBtn">Clear</button>
    </div>

    <div class="panel">
      <label>Model Output:</label>
      <div class="output" id="outputBox">
Sentiment:
  —
      </div>
    </div>

    <div class="footer">
      Malayalam Text Classifier Demo • HTML + CSS + JavaScript
    </div>
  </div>

  <script>
    
    const inputText = document.getElementById('inputText');
    const outputBox = document.getElementById('outputBox');
    const classifyBtn = document.getElementById('classifyBtn');
    const clearBtn = document.getElementById('clearBtn');

    const API_URL = 'http://127.0.0.1:8000/classify';
    
    classifyBtn.addEventListener('click', async () => {
      const text = inputText.value.trim();

      if (text === '') {
        outputBox.textContent = "⚠️ Please enter Malayalam text before classifying.";
        return;
      }

      outputBox.innerHTML = "⏳ Analyzing text...";
      classifyBtn.disabled = true;

      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text })
        });

        if (!res.ok) {
          // Parse error response
          const errorData = await res.json();
          const errorMessage = errorData.error || 'Request failed';
          throw new Error(errorMessage);
        }

        const data = await res.json();
        const { label } = data;

        // Format output with styling - only sentiment
        const labelClass = label === 'positive' ? 'sentiment-positive' : 
                          label === 'negative' ? 'sentiment-negative' : 'sentiment-neutral';
        
        outputBox.innerHTML = `<div class="sentiment-label ${labelClass}">Sentiment: ${label ?? '—'}</div>`;
      } catch (e) {
        outputBox.innerHTML = `<div style="color: #f87171; font-weight: bold;">❌ ${e?.message || e}</div>`;
      } finally {
        classifyBtn.disabled = false;
      }
    });

    // Clear button action
    clearBtn.addEventListener('click', () => {
      inputText.value = '';
      outputBox.innerHTML = 'Sentiment:\n  —';
    });

    // Allow Enter key to submit (Ctrl+Enter or Cmd+Enter)
    inputText.addEventListener('keydown', (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
        classifyBtn.click();
      }
    });
  </script>
</body>
</html>
